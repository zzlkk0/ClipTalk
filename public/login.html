<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 — 共享工作区</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f14; --panel: #1a1a24; --border: #2a2a3a;
    --text: #d0d0dc; --dim: #707088; --accent: #6c8cff;
    --danger: #ff6b7a; --success: #50d890; --input: #14141e;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 36px 40px;
    width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .logo-row { text-align: center; margin-bottom: 24px; }
  .logo-row .icon { font-size: 40px; display: block; margin-bottom: 8px; }
  .logo-row .title { font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo-row .subtitle { font-size: 12px; color: var(--dim); margin-top: 4px; }

  .input-group { margin-bottom: 14px; }
  .input-group label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); background: var(--input);
    color: var(--text); border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }

  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s; margin-top: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; }
  .msg.error { color: var(--danger); animation: shake 0.3s; }
  .msg.success { color: var(--success); }

  .link-row { text-align: center; font-size: 13px; margin-top: 16px; }
  .link-row a { color: var(--accent); text-decoration: none; }
  .link-row a:hover { text-decoration: underline; }

  .lang-row { display: flex; justify-content: center; gap: 8px; margin-top: 16px; }
  .lang-btn { padding: 4px 14px; border: 1px solid var(--border); background: transparent; color: var(--dim); border-radius: 14px; cursor: pointer; font-size: 12px; }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); }

  .hint { text-align: center; font-size: 11px; color: var(--dim); margin-top: 16px; }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)}
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo-row">
    <span class="icon">🔒</span>
    <div class="title" data-t="login.heading">共享工作区</div>
    <div class="subtitle" data-t="login.subheading">端到端加密通信 · 需密码访问</div>
  </div>

  <div class="input-group">
    <label data-t="login.username">用户名</label>
    <input type="text" id="username" data-t-placeholder="login.placeholder_username" placeholder="输入用户名…" autofocus autocomplete="username">
  </div>

  <div class="input-group">
    <label data-t="login.password">密码</label>
    <input type="password" id="password" data-t-placeholder="login.placeholder_password" placeholder="输入密码…" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
  </div>

  <button class="btn btn-primary" id="btn" onclick="doLogin()" data-t="login.btn_login">登录</button>

  <div class="msg" id="msg"></div>

  <div class="link-row">
    <span data-t="login.no_account">没有账号？</span>
    <a href="/register.html" data-t="login.register_link">立即注册</a>
  </div>

  <div class="lang-row">
    <button class="lang-btn active" onclick="switchLang('zh-CN')">中文</button>
    <button class="lang-btn" onclick="switchLang('en')">English</button>
  </div>

  <div class="hint" data-t="login.hint">通信通过 HTTPS + WSS 加密</div>
</div>

<script>
let lang = localStorage.getItem('lang') || 'zh-CN';
let i18n = {};

async function loadLang(l) {
  try {
    const resp = await fetch('/api/i18n/' + l);
    i18n = await resp.json(); lang = l;
    localStorage.setItem('lang', l);
    fetch('/api/lang', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lang:l})});
    applyLang(); updateLangBtns();
  } catch(e) {}
}

function t(path) { return path.split('.').reduce((o,k)=>(o||{})[k], i18n) || path; }

function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelectorAll('[data-t-placeholder]').forEach(el => { el.placeholder = t(el.dataset.tPlaceholder); });
  document.title = t('login.title') || document.title;
}

function updateLangBtns() {
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang==='en'?'English':'中文'));
  });
}

function switchLang(l) { loadLang(l); }

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  msg.className = 'msg'; msg.textContent = '';
  if (!username) { msg.className='msg error'; msg.textContent=t('login.error_empty_username'); return; }
  if (!password) { msg.className='msg error'; msg.textContent=t('login.error_empty_password'); return; }

  btn.disabled = true;
  try {
    const resp = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await resp.json();
    if (data.ok) {
      window.location.href = data.redirect;
    } else {
      msg.className = 'msg error';
      const errKey = 'login.error_' + data.error;
      msg.textContent = t(errKey) || data.error;
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch(e) { msg.className='msg error'; msg.textContent=t('login.error_network'); }
  btn.disabled = false;
}

loadLang(lang);
</script>
</body>
</html>
