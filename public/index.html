<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共享工作区 — Shared Workspace</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f14; --panel: #1a1a24; --border: #2a2a3a;
    --text: #d0d0dc; --dim: #707088; --accent: #6c8cff;
    --accent2: #50d890; --danger: #ff6b7a; --hover: #252535; --input: #14141e;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar .logo { font-weight: 700; font-size: 15px; color: var(--accent); }
  .topbar .status { font-size: 12px; color: var(--dim); flex: 1; }
  .topbar .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); margin-right: 4px; }
  .topbar .status-dot.off { background: var(--danger); }
  .tag {
    font-size: 11px; padding: 3px 10px; border-radius: 10px;
    border: 1px solid var(--border); color: var(--dim); cursor: pointer;
    transition: all 0.15s;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tag.admin-tag { border-color: var(--warn, #f0c060); color: var(--warn, #f0c060); }

  .main { display: flex; flex: 1; overflow: hidden; gap: 1px; background: var(--border); }
  .panel { background: var(--panel); display: flex; flex-direction: column; min-width: 260px; flex: 1; }
  .panel-header {
    padding: 10px 14px; font-size: 12px; font-weight: 600;
    color: var(--dim); border-bottom: 1px solid var(--border); flex-shrink: 0;
    text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;
  }

  #clipboard-area {
    flex: 1; padding: 10px; background: var(--input); border: none; outline: none;
    color: var(--text); font-family: "JetBrains Mono", "Fira Code", monospace;
    font-size: 13px; line-height: 1.6; resize: none;
  }
  #clipboard-area::placeholder { color: var(--dim); }
  .clip-actions { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .clip-actions button {
    flex: 1; padding: 6px 12px; border: 1px solid var(--border);
    background: var(--hover); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .clip-actions button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  #chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .chat-msg { font-size: 13px; line-height: 1.5; animation: fadeIn 0.2s; }
  .chat-msg.system { color: var(--dim); font-size: 12px; text-align: center; padding: 4px 0; }
  .chat-msg .time { font-size: 10px; color: var(--dim); margin-right: 6px; }
  .chat-msg .sender { color: var(--accent); font-weight: 600; margin-right: 6px; }
  .chat-msg a { color: var(--accent2); text-decoration: underline; cursor: pointer; }
  .chat-input-row { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input-row input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    background: var(--input); color: var(--text); border-radius: 6px; font-size: 13px; outline: none;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .chat-input-row button {
    padding: 8px 16px; border: none; background: var(--accent); color: #fff;
    border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px;
  }
  .chat-input-row button:hover { opacity: 0.85; }

  .drop-zone {
    margin: 10px; padding: 26px 20px; border: 2px dashed var(--border);
    border-radius: 10px; text-align: center; color: var(--dim); font-size: 13px;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,0.06); }
  .drop-zone .drop-icon { font-size: 30px; display: block; margin-bottom: 6px; }
  #file-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
  .file-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 6px; font-size: 13px; transition: background 0.15s;
  }
  .file-item:hover { background: var(--hover); }
  .file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fsize { color: var(--dim); font-size: 11px; flex-shrink: 0; }
  .file-item a {
    color: var(--accent); text-decoration: none; font-size: 12px;
    padding: 4px 10px; border: 1px solid var(--accent); border-radius: 4px;
  }
  .file-item a:hover { background: var(--accent); color: #fff; }
  .file-item .del-btn { color: var(--danger); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
  .file-item .del-btn:hover { background: rgba(255,107,122,0.15); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 900px) { .main { flex-direction: column; } .panel { min-width: unset; max-height: 33vh; } }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">⚡ <span data-t="workspace.title">共享工作区</span></span>
  <span class="status"><span class="status-dot" id="status-dot"></span><span id="status-text">-</span></span>
  <span class="tag" id="admin-btn" onclick="location.href='/admin3.html'" style="display:none" data-t="workspace.admin_panel">管理</span>
  <span class="tag" id="role-tag" onclick="toggleRole()">💻 PC</span>
  <span class="tag" id="lang-btn" onclick="toggleLang()">🌐</span>
  <span class="tag" onclick="doLogout()" data-t="workspace.logout">退出</span>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-header">📋 <span data-t="workspace.clipboard">共享剪贴板</span></div>
    <textarea id="clipboard-area" data-t-placeholder="workspace.clipboard_placeholder" placeholder="在这里粘贴或输入文本…"></textarea>
    <div class="clip-actions">
      <button onclick="copyToSystemClipboard()" data-t="workspace.copy_system">复制到系统剪贴板</button>
      <button onclick="clearClipboard()" data-t="workspace.clear">清空</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">💬 <span data-t="workspace.chat">对话</span></div>
    <div id="chat-messages"></div>
    <div class="chat-input-row">
      <input id="chat-input" data-t-placeholder="workspace.chat_placeholder" placeholder="输入消息…" onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()" data-t="workspace.send">发送</button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header">📁 <span data-t="workspace.files">文件传输</span></div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <span class="drop-icon">📤</span>
      <span data-t="workspace.drop_text">拖拽文件到这里 或 点击选择</span><br>
      <small data-t="workspace.drop_max">最大 500MB / 文件</small>
    </div>
    <input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">
    <div id="file-list"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── i18n ───────────────────────────────────────
let lang = localStorage.getItem('lang') || 'zh-CN';
let i18n = {};

async function loadLang(l) {
  try {
    const resp = await fetch('/api/i18n/' + l);
    i18n = await resp.json(); lang = l;
    localStorage.setItem('lang', l);
    fetch('/api/lang', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lang:l})});
    applyLang();
  } catch(e) {}
}

function t(path) { return path.split('.').reduce((o,k)=>(o||{})[k], i18n) || path; }

function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.querySelectorAll('[data-t-placeholder]').forEach(el => { el.placeholder = t(el.dataset.tPlaceholder); });
  document.title = t('workspace.title');
}

function switchLang(l) { loadLang(l); }
function toggleLang() {
  var next = (lang === 'zh-CN') ? 'en' : 'zh-CN';
  loadLang(next);
  var btn = document.getElementById('lang-btn');
  if (btn) btn.textContent = (next === 'en') ? '🌐 EN' : '🌐 中文';
}

// ─── 认证检查 ───────────────────────────────────
let myRole = 'PC';
let myUserRole = 'user';

async function checkAuth() {
  try {
    const resp = await fetch('/api/me');
    if (!resp.ok) { window.location.href = '/login.html'; return; }
    const user = await resp.json();
    myUserRole = user.role;
    lang = user.language || localStorage.getItem('lang') || 'zh-CN';
    await loadLang(lang);
    if (user.role === 'admin') {
      document.getElementById('admin-btn').style.display = '';
    }
    initApp();
  } catch(e) {
    window.location.href = '/login.html';
  }
}

// ─── App ────────────────────────────────────────
let socket, clipboardSyncing = false;

function initApp() {
  socket = io();

  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const clipboardArea = document.getElementById('clipboard-area');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const fileList = document.getElementById('file-list');
  const dropZone = document.getElementById('drop-zone');
  const roleTag = document.getElementById('role-tag');

  function toggleRole() {
    myRole = myRole === 'PC' ? 'SERVER' : 'PC';
    roleTag.textContent = myRole === 'PC' ? '💻 ' + t('workspace.role_pc') : '🖥️ ' + t('workspace.role_server');
    roleTag.classList.toggle('active', myRole === 'SERVER');
  }
  window.toggleRole = toggleRole;

  socket.on('connect', () => { statusDot.classList.remove('off'); statusText.textContent = t('workspace.connected'); });
  socket.on('disconnect', () => { statusDot.classList.add('off'); statusText.textContent = t('workspace.disconnected'); });

  socket.on('init', (data) => {
    if (data.clipboardText) clipboardArea.value = data.clipboardText;
    if (data.messages) { chatMessages.innerHTML = ''; data.messages.forEach(m => appendMsg(m, false)); scrollChat(); }
    if (data.files) renderFileList(data.files);
  });

  clipboardArea.addEventListener('input', () => {
    if (clipboardSyncing) return;
    socket.emit('clipboard-update', clipboardArea.value);
  });

  socket.on('clipboard-update', (text) => {
    clipboardSyncing = true; clipboardArea.value = text; clipboardSyncing = false;
  });

  window.copyToSystemClipboard = function() {
    navigator.clipboard.writeText(clipboardArea.value).then(() => {
      appendMsg({type:'system',text:'✅ '+t('workspace.copied'),time:Date.now()}, true);
    }).catch(() => { clipboardArea.select(); document.execCommand('copy'); });
  };

  window.clearClipboard = function() { clipboardArea.value = ''; socket.emit('clipboard-update', ''); };

  window.sendMessage = function() {
    const text = chatInput.value.trim();
    if (!text) return;
    socket.emit('chat-message', { text });
    chatInput.value = '';
  };

  socket.on('chat-message', (msg) => appendMsg(msg, true));

  function appendMsg(msg, scroll) {
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type || 'user');
    if (msg.type === 'system') {
      div.textContent = msg.text;
      if (msg.files) msg.files.forEach(f => {
        const a = document.createElement('a'); a.textContent = ' 📥 ' + f.originalName;
        a.href = '/uploads/' + f.name; a.download = f.originalName; div.appendChild(a);
      });
    } else {
      const time = new Date(msg.time).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
      div.innerHTML = `<span class="time">${time}</span><span class="sender">${escHtml(msg.from||'?')}</span>${escHtml(msg.text)}`;
    }
    chatMessages.appendChild(div);
    if (scroll) scrollChat();
  }

  function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }
  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) uploadFiles(e.dataTransfer.files);
  });

  window.uploadFiles = async function(fileList) {
    const formData = new FormData();
    for (const f of fileList) formData.append('files', f);
    appendMsg({type:'system',text:'⏳ '+t('workspace.uploading')+'...',time:Date.now()}, true);
    try {
      const resp = await fetch('/upload', {method:'POST',body:formData});
      const data = await resp.json();
      if (data.ok) appendMsg({type:'system',text:'✅ '+t('workspace.upload_done'),time:Date.now()}, true);
    } catch(e) {
      appendMsg({type:'system',text:'❌ '+t('workspace.upload_fail'),time:Date.now()}, true);
    }
  };

  socket.on('files-updated', (files) => renderFileList(files));

  function renderFileList(files) {
    fileList.innerHTML = files.length === 0
      ? `<div style="text-align:center;color:var(--dim);padding:20px;font-size:13px">${t('workspace.no_files')}</div>` : '';
    files.forEach(f => {
      const sizeStr = f.size < 1024 ? f.size + ' B' : f.size < 1024*1024 ? (f.size/1024).toFixed(1)+' KB' : (f.size/(1024*1024)).toFixed(1)+' MB';
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `<span style="font-size:18px">📄</span>
        <span class="fname" title="${escHtml(f.originalName)}">${escHtml(f.originalName)}</span>
        <span class="fsize">${sizeStr}</span>
        <a href="/uploads/${f.name}" download="${escHtml(f.originalName)}">${t('workspace.download')}</a>
        <span class="del-btn" onclick="deleteFile('${f.name}')">✕</span>`;
      fileList.appendChild(div);
    });
  }

  window.deleteFile = async function(name) {
    try { await fetch('/api/files/'+encodeURIComponent(name),{method:'DELETE'}); } catch(e) {}
  };

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'k') { e.preventDefault(); chatInput.focus(); }
  });
}

function doLogout() {
  if (confirm(t('workspace.logout_confirm'))) {
    fetch('/api/logout',{method:'POST'}).then(()=>{window.location.href='/login.html'});
  }
}

checkAuth();
</script>
</body>
</html>
