<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板 — 共享工作区</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f14; --panel: #1a1a24; --border: #2a2a3a;
    --text: #d0d0dc; --dim: #707088; --accent: #6c8cff; --accent2: #50d890;
    --danger: #ff6b7a; --warn: #f0c060; --input: #14141e; --hover: #252535;
  }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column;
  }
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px; background: var(--panel);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .topbar .title { font-weight: 700; color: var(--accent); font-size: 15px; }
  .topbar .stats { font-size: 12px; color: var(--dim); margin-left: auto; display: flex; gap: 16px; }
  .topbar .stats span { display: flex; align-items: center; gap: 4px; }
  .topbar a { color: var(--accent); text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid var(--accent); border-radius: 6px; }
  .topbar a:hover { background: var(--accent); color: #fff; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel); padding: 0 20px; }
  .tab-btn {
    padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--dim); cursor: pointer; font-size: 13px; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text); }
  .tab-btn .badge { background: var(--danger); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }

  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
  .tab-content.active { display: block; }

  .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .user-table th { text-align: left; color: var(--dim); font-size: 11px; text-transform: uppercase; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .user-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .user-table tr:hover td { background: var(--hover); }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .badge.admin { background: rgba(108,140,255,0.2); color: var(--accent); }
  .badge.user { background: rgba(112,112,136,0.2); color: var(--dim); }
  .badge.active { background: rgba(80,216,144,0.2); color: var(--accent2); }
  .badge.disabled { background: rgba(255,107,122,0.2); color: var(--danger); }
  .badge.pending { background: rgba(240,192,96,0.2); color: var(--warn); }

  .btn-sm {
    padding: 4px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
    border: 1px solid var(--border); background: var(--hover); color: var(--text);
    transition: all 0.15s; margin-right: 4px;
  }
  .btn-sm:hover { opacity: 0.85; }
  .btn-sm.approve { border-color: var(--accent2); color: var(--accent2); }
  .btn-sm.approve:hover { background: var(--accent2); color: #fff; }
  .btn-sm.reject { border-color: var(--danger); color: var(--danger); }
  .btn-sm.reject:hover { background: var(--danger); color: #fff; }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }

  .settings-section { max-width: 500px; }
  .settings-card {
    background: var(--input); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .settings-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--accent); }
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  .setting-row label { font-size: 13px; color: var(--text); }
  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    padding: 5px 14px; border: 1px solid var(--border); background: transparent;
    color: var(--dim); cursor: pointer; font-size: 12px; transition: all 0.15s;
  }
  .toggle-btn:first-child { border-radius: 6px 0 0 6px; }
  .toggle-btn:last-child { border-radius: 0 6px 6px 0; }
  .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); border-radius: 6px; font-size: 13px; outline: none;
  }
  .input-row input:focus { border-color: var(--accent); }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 100;
    animation: slideIn 0.3s; color: #fff;
  }
  .toast.success { background: var(--accent2); }
  .toast.error { background: var(--danger); }

  @keyframes slideIn { from { transform: translateY(20px); opacity:0 } to { transform: translateY(0); opacity:1 } }
</style>
</head>
<body>

<div class="topbar">
  <span class="title">⚙️ <span data-t="admin.heading">管理面板</span></span>
  <div class="stats">
    <span>👥 <span data-t="admin.total_users">用户总数</span>: <b id="stat-total">-</b></span>
    <span>✅ <span data-t="admin.active_users">活跃</span>: <b id="stat-active">-</b></span>
    <span>⏳ <span data-t="admin.pending_users">待审批</span>: <b id="stat-pending">-</b></span>
  </div>
  <a href="/" data-t="admin.back_to_workspace">返回工作区</a>
  <a href="/api/logout" style="border-color:var(--danger);color:var(--danger)" onclick="event.preventDefault();fetch('/api/logout',{method:'POST'}).then(()=>location.href='/login.html')">🚪</a>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="users" data-t="admin.tab_users">用户管理</button>
  <button class="tab-btn" data-tab="pending" data-t="admin.tab_pending"><span id="pending-count"></span></button>
  <button class="tab-btn" data-tab="settings" data-t="admin.tab_settings">系统设置</button>
</div>

<!-- 用户管理 -->
<div class="tab-content active" id="tab-users">
  <table class="user-table">
    <thead><tr>
      <th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>最后登录</th><th>操作</th>
    </tr></thead>
    <tbody id="users-tbody"></tbody>
  </table>
</div>

<!-- 待审批 -->
<div class="tab-content" id="tab-pending">
  <div id="pending-list"></div>
</div>

<!-- 系统设置 -->
<div class="tab-content settings-section" id="tab-settings">
  <div class="settings-card">
    <h3 data-t="admin.setting_approval">审批模式</h3>
    <div class="setting-row">
      <label>新用户注册</label>
      <div class="toggle-group" id="approval-toggle">
        <button class="toggle-btn" data-val="auto" data-t="admin.setting_approval_auto">自动通过</button>
        <button class="toggle-btn active" data-val="manual" data-t="admin.setting_approval_manual">手动审批</button>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <h3 data-t="admin.setting_registration">开放注册</h3>
    <div class="setting-row">
      <label>允许新用户注册</label>
      <div class="toggle-group" id="reg-toggle">
        <button class="toggle-btn active" data-val="true" data-t="admin.setting_registration_on">开启</button>
        <button class="toggle-btn" data-val="false" data-t="admin.setting_registration_off">关闭</button>
      </div>
    </div>
  </div>

  <div class="settings-card">
    <h3 data-t="admin.change_admin_password">修改管理员密码</h3>
    <div class="input-row">
      <input type="password" id="cur-pwd" placeholder="当前密码" style="flex:1">
      <input type="password" id="new-pwd" placeholder="新密码" style="flex:1">
      <button class="btn-sm approve" onclick="changePwd()" data-t="admin.btn_change">修改</button>
    </div>
  </div>

  <div id="settings-toast"></div>
</div>

<script>
let lang = localStorage.getItem('lang') || 'zh-CN';
let i18n = {};

async function loadLang(l) {
  try {
    const resp = await fetch('/api/i18n/' + l);
    i18n = await resp.json(); lang = l;
    applyLang();
  } catch(e) {}
}
function t(p) { return p.split('.').reduce((o,k)=>(o||{})[k], i18n) || p; }
function applyLang() {
  document.querySelectorAll('[data-t]').forEach(el => { el.textContent = t(el.dataset.t); });
  document.title = t('admin.title');
}

function showToast(msg, type) {
  const el = document.getElementById('settings-toast');
  el.innerHTML = `<div class="toast ${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 2500);
}

// ─── 标签切换 ────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'users' || btn.dataset.tab === 'pending') loadUsers();
  });
});

// ─── 用户数据加载 ────────────────────────
async function loadUsers() {
  const tbody = document.getElementById('users-tbody');
  const statTotal = document.getElementById('stat-total');
  
  try {
    const [usersResp, statsResp] = await Promise.all([
      fetch('/api/admin/users'), fetch('/api/admin/stats')
    ]);
    if (!usersResp.ok || !statsResp.ok) {
      throw new Error('API ' + usersResp.status + '/' + statsResp.status);
    }
    const users = await usersResp.json();
    const stats = await statsResp.json();

    document.getElementById('stat-total').textContent = stats.total;
    document.getElementById('stat-active').textContent = stats.active;
    document.getElementById('stat-pending').textContent = stats.pending;
    if (stats.pending > 0) {
      document.getElementById('pending-count').innerHTML = `<span class="badge">${stats.pending}</span>`;
    } else {
      document.getElementById('pending-count').textContent = '';
    }

    // 用户表格
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = users.map(u => {
      const time = new Date(u.created_at).toLocaleString('zh-CN');
      const lastLogin = u.last_login ? new Date(u.last_login).toLocaleString('zh-CN') : '-';
      return `<tr>
        <td><b>${esc(u.username)}</b></td>
        <td><span class="badge ${u.role}">${u.role}</span></td>
        <td><span class="badge ${u.status}">${u.status}</span></td>
        <td style="font-size:11px;color:var(--dim)">${time}</td>
        <td style="font-size:11px;color:var(--dim)">${lastLogin}</td>
        <td>${u.role !== 'admin' ? userActions(u) : '<span style="color:var(--dim);font-size:11px">protected</span>'}</td>
      </tr>`;
    }).join('');

    // 待审批列表
    const pending = users.filter(u => u.status === 'pending');
    const pendingDiv = document.getElementById('pending-list');
    if (pending.length === 0) {
      pendingDiv.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px" data-t="admin.no_pending">没有待审批的用户</div>';
    } else {
      pendingDiv.innerHTML = pending.map(u => `
        <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--input);border:1px solid var(--border);border-radius:8px;margin-bottom:8px">
          <b>${esc(u.username)}</b>
          <span style="font-size:11px;color:var(--dim);flex:1">${new Date(u.created_at).toLocaleString('zh-CN')}</span>
          <button class="btn-sm approve" onclick="approveUser('${u.id}')">✅ ${t('admin.approve')}</button>
          <button class="btn-sm reject" onclick="rejectUser('${u.id}')">❌ ${t('admin.reject')}</button>
        </div>
      `).join('');
    }
  } catch(e) {
    console.error('加载用户失败:', e);
    const tbody = document.getElementById('users-tbody');
    if (tbody) tbody.innerHTML = '<tr><td colspan="6" style="color:var(--danger);text-align:center;padding:20px">加载失败: ' + e.message + '</td></tr>';
    const pendingDiv = document.getElementById('pending-list');
    if (pendingDiv) pendingDiv.innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px">加载失败</div>';
  }
}

function userActions(u) {
  let actions = '';
  if (u.status === 'pending') {
    actions += `<button class="btn-sm approve" onclick="approveUser('${u.id}')">${t('admin.approve')}</button>`;
    actions += `<button class="btn-sm reject" onclick="rejectUser('${u.id}')">${t('admin.reject')}</button>`;
  } else if (u.status === 'active') {
    actions += `<button class="btn-sm danger" onclick="disableUser('${u.id}')">${t('admin.disable')}</button>`;
  } else if (u.status === 'disabled') {
    actions += `<button class="btn-sm approve" onclick="enableUser('${u.id}')">${t('admin.enable')}</button>`;
  }
  actions += `<button class="btn-sm reject" onclick="deleteUser('${u.id}')">${t('admin.delete')}</button>`;
  return actions;
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ─── 用户操作 ────────────────────────────
async function approveUser(id) {
  await fetch('/api/admin/users/' + id + '/approve', {method:'POST'});
  loadUsers();
}
async function rejectUser(id) {
  if (!confirm(t('admin.confirm_reject'))) return;
  await fetch('/api/admin/users/' + id + '/reject', {method:'POST'});
  loadUsers();
}
async function disableUser(id) {
  await fetch('/api/admin/users/' + id + '/status', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'disabled'})});
  loadUsers();
}
async function enableUser(id) {
  await fetch('/api/admin/users/' + id + '/status', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status:'active'})});
  loadUsers();
}
async function deleteUser(id) {
  if (!confirm(t('admin.confirm_delete'))) return;
  await fetch('/api/admin/users/' + id, {method:'DELETE'});
  loadUsers();
}

// ─── 设置 ────────────────────────────────
async function loadSettings() {
  const resp = await fetch('/api/admin/settings');
  const s = await resp.json();
  document.querySelectorAll('#approval-toggle .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === s.approval_mode);
  });
  document.querySelectorAll('#reg-toggle .toggle-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === String(s.registration_enabled === 'true'));
  });

  // 点击切换
  document.getElementById('approval-toggle').onclick = async (e) => {
    if (!e.target.classList.contains('toggle-btn')) return;
    const val = e.target.dataset.val;
    await fetch('/api/admin/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({approval_mode:val})});
    loadSettings();
    showToast(t('admin.settings_saved'), 'success');
  };
  document.getElementById('reg-toggle').onclick = async (e) => {
    if (!e.target.classList.contains('toggle-btn')) return;
    const val = e.target.dataset.val;
    await fetch('/api/admin/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({registration_enabled: val === 'true'})});
    loadSettings();
    showToast(t('admin.settings_saved'), 'success');
  };
}

async function changePwd() {
  const cur = document.getElementById('cur-pwd').value;
  const nw = document.getElementById('new-pwd').value;
  if (!cur || !nw) { showToast('Please fill all fields', 'error'); return; }
  if (nw.length < 6) { showToast('Password too short', 'error'); return; }
  try {
    const resp = await fetch('/api/admin/change-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({currentPassword:cur, newPassword:nw})
    });
    const data = await resp.json();
    if (data.ok) {
      showToast(t('admin.password_changed'), 'success');
      document.getElementById('cur-pwd').value = '';
      document.getElementById('new-pwd').value = '';
    } else {
      showToast(data.error || 'Error', 'error');
    }
  } catch(e) { showToast('Network error', 'error'); }
}

// ─── 初始化 ──────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  // DOM 诊断
  const elems = ['users-tbody','stat-total','stat-active','stat-pending','pending-list','pending-count'];
  const missing = elems.filter(id => !document.getElementById(id));
  if (missing.length > 0) {
    document.body.innerHTML = '<div style="color:var(--danger);padding:40px;text-align:center"><h2>DOM 缺失</h2><p>找不到: ' + missing.join(', ') + '</p><p>请 Ctrl+Shift+R 强制刷新</p></div>';
    return;
  }
  await loadLang(lang);
  await loadUsers();
  await loadSettings();
});
</script>
</body>
</html>
