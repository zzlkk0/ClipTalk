<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理面板</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f14;--card:#1a1a24;--border:#2a2a3a;--text:#d0d0dc;
    --dim:#707088;--accent:#6c8cff;--green:#50d890;--red:#ff6b7a;
    --amber:#f0c060;--input:#14141e;--hover:#252535;
  }
  body{
    font-family:-apple-system,"Segoe UI","Noto Sans SC",sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
  }
  /* ── 顶栏 ── */
  .topbar{
    display:flex;align-items:center;gap:16px;padding:12px 24px;
    background:var(--card);border-bottom:1px solid var(--border);
  }
  .topbar .logo{font-weight:700;font-size:16px;color:var(--accent)}
  .topbar .spacer{flex:1}
  .topbar a{
    color:var(--text);text-decoration:none;font-size:13px;
    padding:6px 14px;border-radius:6px;transition:all .15s;
  }
  .topbar a:hover{background:var(--hover)}
  .topbar a.danger{color:var(--red)}
  .topbar a.danger:hover{background:rgba(255,107,122,.1)}
  /* ── 统计卡片 ── */
  .stats-row{
    display:flex;gap:16px;padding:24px;max-width:900px;margin:0 auto;
  }
  .stat-card{
    flex:1;background:var(--card);border:1px solid var(--border);
    border-radius:10px;padding:20px;text-align:center;
  }
  .stat-card .num{font-size:32px;font-weight:700;color:var(--accent)}
  .stat-card .num.green{color:var(--green)}
  .stat-card .num.amber{color:var(--amber)}
  .stat-card .label{font-size:12px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  /* ── 内容区 ── */
  .container{max-width:900px;margin:0 auto;padding:0 24px 40px}
  .card{
    background:var(--card);border:1px solid var(--border);
    border-radius:10px;overflow:hidden;margin-bottom:20px;
  }
  .card-header{
    padding:14px 20px;font-size:13px;font-weight:600;color:var(--dim);
    border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;
  }
  /* ── 表格 ── */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--input)}
  td{padding:10px 16px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--hover)}
  .badge{font-size:11px;padding:2px 10px;border-radius:10px;font-weight:600}
  .badge-admin{background:rgba(108,140,255,.2);color:var(--accent)}
  .badge-user{background:rgba(112,112,136,.2);color:var(--dim)}
  .badge-active{background:rgba(80,216,144,.2);color:var(--green)}
  .badge-disabled{background:rgba(255,107,122,.2);color:var(--red)}
  .badge-pending{background:rgba(240,192,96,.2);color:var(--amber)}
  /* ── 按钮 ── */
  .btn{
    padding:4px 12px;border:1px solid var(--border);background:var(--hover);
    color:var(--text);border-radius:5px;cursor:pointer;font-size:12px;
    margin:2px;transition:all .15s;
  }
  .btn:hover{opacity:.85}
  .btn-ok{border-color:var(--green);color:var(--green)}
  .btn-ok:hover{background:var(--green);color:#fff}
  .btn-warn{border-color:var(--amber);color:var(--amber)}
  .btn-warn:hover{background:var(--amber);color:#fff}
  .btn-del{border-color:var(--red);color:var(--red)}
  .btn-del:hover{background:var(--red);color:#fff}
  /* ── 设置表单 ── */
  .setting-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;border-bottom:1px solid var(--border);
  }
  .setting-row:last-child{border-bottom:none}
  .setting-row label{font-size:13px}
  .toggle-group{display:flex;gap:4px}
  .toggle{
    padding:5px 14px;border:1px solid var(--border);background:transparent;
    color:var(--dim);cursor:pointer;font-size:12px;transition:all .15s;
  }
  .toggle:first-child{border-radius:6px 0 0 6px}
  .toggle:last-child{border-radius:0 6px 6px 0}
  .toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .toggle.on.green{background:var(--green);border-color:var(--green)}
  .input-line{display:flex;gap:10px;align-items:center;padding:16px 20px}
  .input-line input{
    flex:1;padding:8px 12px;border:1px solid var(--border);
    background:var(--input);color:var(--text);border-radius:6px;
    font-size:13px;outline:none;max-width:220px;
  }
  .input-line input:focus{border-color:var(--accent)}
  .toast{font-size:12px;margin-left:12px;min-width:80px}
  .toast.ok{color:var(--green)} .toast.err{color:var(--red)}
  /* ── 加载/错误 ── */
  .center-msg{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}
  .center-msg.err{color:var(--red)}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">⚙️ 管理面板</span>
  <span id="top-stats" style="color:var(--dim);font-size:13px"></span>
  <span class="spacer"></span>
  <a href="/">← 返回工作区</a>
  <a href="/" class="danger" onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.href='/login.html');return false">退出登录</a>
</div>

<div id="app"><div class="center-msg"><span class="spin"></span>加载中...</div></div>

<script>
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

async function load(){
  const app=document.getElementById('app');
  try{
    const [uResp,sResp,setResp]=await Promise.all([
      fetch('/api/admin/users'),fetch('/api/admin/stats'),fetch('/api/admin/settings')
    ]);
    if(!uResp.ok)throw new Error('请求被拒 (HTTP '+uResp.status+')，请确认已用管理员账号登录');
    const users=await uResp.json();
    const stats=await sResp.json();
    const settings=await setResp.json();

    document.getElementById('top-stats').textContent=
      '用户 '+stats.total+'  |  活跃 '+stats.active+'  |  待审批 '+stats.pending;

    var h='';

    // 统计卡片
    h+='<div class="stats-row">';
    h+='<div class="stat-card"><div class="num">'+stats.total+'</div><div class="label">用户总数</div></div>';
    h+='<div class="stat-card"><div class="num green">'+stats.active+'</div><div class="label">活跃用户</div></div>';
    h+='<div class="stat-card"><div class="num amber">'+stats.pending+'</div><div class="label">待审批</div></div>';
    h+='</div><div class="container">';

    // 用户表格
    h+='<div class="card">';
    h+='<div class="card-header">👥 用户管理</div>';
    if(users.length===0){
      h+='<div class="center-msg">暂无用户</div>';
    }else{
      h+='<table><thead><tr><th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
      users.forEach(function(u){
        var time=new Date(u.created_at).toLocaleString('zh-CN');
        h+='<tr>';
        h+='<td><b>'+esc(u.username)+'</b></td>';
        h+='<td><span class="badge badge-'+u.role+'">'+u.role+'</span></td>';
        h+='<td><span class="badge badge-'+u.status+'">'+u.status+'</span></td>';
        h+='<td style="font-size:11px;color:var(--dim)">'+time+'</td>';
        h+='<td>';
        if(u.role!=='admin'){
          if(u.status==='pending'){
            h+='<button class="btn btn-ok" onclick="act(\''+u.id+'\',\'approve\')">✓ 通过</button>';
            h+='<button class="btn btn-del" onclick="act(\''+u.id+'\',\'reject\')">✕ 拒绝</button>';
          }else if(u.status==='active'){
            h+='<button class="btn btn-warn" onclick="act(\''+u.id+'\',\'disable\')">禁用</button>';
            h+='<button class="btn btn-del" onclick="act(\''+u.id+'\',\'delete\')">删除</button>';
          }else{
            h+='<button class="btn btn-ok" onclick="act(\''+u.id+'\',\'enable\')">启用</button>';
            h+='<button class="btn btn-del" onclick="act(\''+u.id+'\',\'delete\')">删除</button>';
          }
        }else{
          h+='<span style="color:var(--dim);font-size:11px">🔒 受保护</span>';
        }
        h+='</td></tr>';
      });
      h+='</tbody></table>';
    }
    h+='</div>';

    // 系统设置
    h+='<div class="card">';
    h+='<div class="card-header">⚡ 系统设置</div>';
    h+='<div class="setting-row">';
    h+='<label>审批模式</label>';
    h+='<div class="toggle-group">';
    h+='<button class="toggle'+(settings.approval_mode==='auto'?' on green':'')+'" onclick="setSetting(\'auto\')">自动通过</button>';
    h+='<button class="toggle'+(settings.approval_mode==='manual'?' on':'')+'" onclick="setSetting(\'manual\')">手动审批</button>';
    h+='</div></div>';
    h+='<div class="setting-row">';
    h+='<label>开放注册</label>';
    h+='<div class="toggle-group">';
    h+='<button class="toggle'+(settings.registration_enabled==='true'?' on green':'')+'" onclick="setReg(true)">开启</button>';
    h+='<button class="toggle'+(settings.registration_enabled!=='true'?' on':'')+'" onclick="setReg(false)">关闭</button>';
    h+='</div></div>';
    h+='<div class="input-line">';
    h+='<label style="font-size:13px;min-width:80px">修改密码</label>';
    h+='<input id="cur-pwd" type="password" placeholder="当前密码">';
    h+='<input id="new-pwd" type="password" placeholder="新密码">';
    h+='<button class="btn btn-ok" onclick="changePwd()">修改</button>';
    h+='<span id="pwd-msg" class="toast"></span>';
    h+='</div></div>';

    h+='</div>';
    app.innerHTML=h;
  }catch(e){
    app.innerHTML='<div class="center-msg err">⚠ 加载失败: '+esc(e.message)+'</div>';
  }
}

async function act(id,action){
  if(action==='delete'&&!confirm('确定删除该用户？此操作不可撤销。'))return;
  if(action==='reject'&&!confirm('确定拒绝该用户？'))return;
  var url='/api/admin/users/'+id+(action==='approve'?'/approve':action==='reject'?'/reject':action==='disable'||action==='enable'?'/status':'');
  var method=action==='delete'?'DELETE':'POST';
  var body=(action==='disable'||action==='enable')?JSON.stringify({status:action==='disable'?'disabled':'active'}):undefined;
  await fetch(url,{method:method,headers:body?{'Content-Type':'application/json'}:undefined,body:body});
  load();
}

async function setSetting(mode){
  await fetch('/api/admin/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approval_mode:mode})});
  load();
}

async function setReg(on){
  await fetch('/api/admin/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({registration_enabled:on})});
  load();
}

async function changePwd(){
  var cur=document.getElementById('cur-pwd').value;
  var pw=document.getElementById('new-pwd').value;
  var el=document.getElementById('pwd-msg');
  if(!cur){el.textContent='请输入当前密码';el.className='toast err';return}
  if(pw.length<6){el.textContent='新密码至少6位';el.className='toast err';return}
  var resp=await fetch('/api/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({currentPassword:cur,newPassword:pw})});
  var data=await resp.json();
  if(data.ok){el.textContent='✓ 密码已更新';el.className='toast ok'}
  else{el.textContent=data.error||'失败';el.className='toast err'}
}

load();
</script>
</body>
</html>
